<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>metroRSS</title>
    <link rel="icon" type="image/x-icon" href="/favicon.png">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #000000; color: #ffffff; font-family: 'Segoe WP', 'Segoe UI', sans-serif; padding: 40px 24px 40px 24px; }
        .page-header { margin-bottom: 35px; }
        .page-title { font-size: 54px; font-weight: 200; letter-spacing: -2px; opacity: 0.95; }
        .about-link { color: #744da9; text-decoration: none; font-size: 16px; font-weight: 400; text-transform: lowercase; border: 2px solid #744da9; padding: 8px 16px; display: inline-block; margin-top: 8px; }
        .about-link:hover { color: white; background: #744da9; }
        .page-subtitle { font-size: 16px; color: #744da9; text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }
        .wp-box { border: 2px solid #744da9; padding: 20px; margin-bottom: 40px; background: #0a0a0a; }
        .wp-box h3 { font-size: 24px; font-weight: 200; text-transform: lowercase; margin-bottom: 15px; }
        input, textarea { display: block; width: 100%; margin-bottom: 15px; background: #111111; color: #fff; border: 2px solid #444444; padding: 12px; font-size: 16px; font-family: inherit; font-weight: 300; }
        input:focus, textarea:focus { outline: none; border-color: #ffffff; }
        textarea { height: 160px; resize: vertical; }
        .wp-btn { background: #744da9; border: 2px solid #744da9; color: white; padding: 10px 25px; font-size: 15px; font-weight: 400; cursor: pointer; text-transform: lowercase; display: inline-block; }
        .wp-btn:hover { background: transparent; color: #744da9; }
        .wp-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .feed-header { font-size: 32px; font-weight: 200; text-transform: lowercase; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        #feed { margin-top: 0; }
        .post { border: 2px solid #222; background: #050505; padding: 18px; margin-bottom: 12px; }
        .post h2 { font-size: 22px; font-weight: 300; line-height: 1.2; text-transform: lowercase; color: #744da9; margin-bottom: 8px; }
        .post p { font-size: 15px; font-weight: 300; color: #ccc; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .loader-gif { width: 30px; height: 30px; display: block; margin: 20px auto; }
        .bar { margin-top: 12px; border-top: 1px solid #222; padding-top: 10px; }
        .like-btn, .cmt-btn { background: none; border: 1px solid #333; color: #fff; padding: 4px 12px; font-size: 13px; cursor: pointer; display: inline-block; font-family: inherit; margin-right: 10px; vertical-align: middle; }
        .like-btn:hover, .cmt-btn:hover { border-color: #744da9; color: #744da9; }
        .like-btn.liked { border-color: #744da9; color: #744da9; }
        .like-btn .material-icons, .cmt-btn .material-icons { font-size: 16px; vertical-align: middle; }
        .lc { min-width: 12px; display: inline-block; }
        .comments { max-height: 0; overflow: hidden; }
        .comments.open { max-height: 500px; overflow-y: auto; margin-top: 10px; }
        .c { font-size: 13px; color: #999; padding: 4px 0; border-bottom: 1px solid #181818; }
        .cd { color: #555; margin-right: 8px; font-size: 11px; }
        .cmt-form { margin-top: 8px; }
        .cmt-input { display: inline-block; background: #111; color: #fff; border: 1px solid #333; padding: 4px 10px; font-size: 13px; font-family: inherit; width: 70%; vertical-align: middle; }
        .cmt-input:focus { outline: none; border-color: #744da9; }
        .cmt-send { background: #744da9; border: none; color: #fff; padding: 2px 6px; cursor: pointer; display: inline-block; vertical-align: middle; }
        .cmt-send .material-icons { font-size: 14px; vertical-align: middle; }
        .emergency-banner { border: 2px solid #e51400; padding: 16px; margin-bottom: 20px; background: #0a0505; display: none; }
        .emergency-banner .label { color: #e51400; font-size: 11px; text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }
        .emergency-banner .text { color: #fff; font-size: 15px; font-weight: 300; margin-top: 6px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .tab-bar { margin-bottom: 20px; border-bottom: 2px solid #222; }
        .tab-btn { background: none; border: none; color: #666; padding: 10px 20px; font-size: 15px; font-family: inherit; font-weight: 300; cursor: pointer; text-transform: lowercase; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .tab-btn:hover { color: #aaa; }
        .tab-btn.active { color: #744da9; border-bottom-color: #744da9; }
        #toast { position: fixed; bottom: 60px; left: 50%; margin-left: -100px; background: #744da9; color: #fff; padding: 10px 24px; font-size: 14px; z-index: 999; display: none; }
    </style>
</head>
<body>
    <div class="page-header">
        <div class="page-subtitle">создай свою новость)</div>
        <div class="page-title">metroRSS <a href="/help.html" class="about-link">что это?</a></div>
    </div>
    <div class="wp-box">
        <h3>создать новость</h3>
        <input id="t" placeholder="заголовок новости">
        <textarea id="d" placeholder="текст новости (поддерживает базовый html: &lt;p&gt;, &lt;b&gt;, &lt;i&gt;)"></textarea>
        <button class="wp-btn" id="submit-btn">
            <i class="material-icons" style="font-size:18px;">send</i> опубликовать
        </button>
    </div>
    <div class="emergency-banner" id="emergency-banner">
        <div class="label">экстренная новость</div>
        <div class="text" id="emergency-text"></div>
    </div>
    <div class="tab-bar">
        <button class="tab-btn active" data-feed="all">все</button>
        <button class="tab-btn" data-feed="liked">мои лайки</button>
    </div>
    <div id="feed"></div>
    <div id="toast"></div>
    <script src="/script.js"></script>
</body>
</html>
