<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>metroRSS</title>
    <link rel="icon" type="image/x-icon" href="/favicon.png">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --win-bg: #000000;
            --win-fg: #ffffff;
            --accent: #880015;
            --ease-wp: cubic-bezier(0.1, 0.9, 0.2, 1);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; user-select: none; }
        body { background: var(--win-bg); color: var(--win-fg); font-family: 'Segoe WP', 'Segoe UI', sans-serif; padding: calc(40px + env(safe-area-inset-top, 0px)) 24px 40px 24px; perspective: 1000px; }
        .page-header { margin-bottom: 35px; }
        .page-title { font-size: 54px; font-weight: 200; letter-spacing: -2px; opacity: 0.95; }
        .page-subtitle { font-size: 16px; color: var(--accent); text-transform: uppercase; font-weight: 600; letter-spacing: 1px; }
        .wp-box { border: 2px solid var(--accent); padding: 20px; margin-bottom: 40px; background: #0a0a0a; animation: wpListIn 0.5s var(--ease-wp) both; }
        .wp-box h3 { font-size: 24px; font-weight: 200; text-transform: lowercase; margin-bottom: 15px; }
        input, textarea { display: block; width: 100%; margin-bottom: 15px; background: #111111; color: #fff; border: 2px solid #444444; padding: 12px; font-size: 16px; font-family: inherit; font-weight: 300; transition: border-color 0.2s; user-select: text; }
        input:focus, textarea:focus { outline: none; border-color: var(--win-fg); }
        textarea { height: 160px; resize: vertical; }
        .wp-btn { background: var(--accent); border: 2px solid var(--accent); color: white; padding: 10px 25px; font-size: 15px; font-weight: 400; cursor: pointer; text-transform: lowercase; transition: all 0.15s ease; display: inline-flex; align-items: center; gap: 8px; }
        .wp-btn:hover { background: transparent; color: var(--accent); }
        .wp-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .feed-header { font-size: 32px; font-weight: 200; text-transform: lowercase; margin-bottom: 15px; border-bottom: 1px solid #222; padding-bottom: 10px; }
        #feed { display: flex; flex-direction: column; gap: 12px; }
        .post { border: 2px solid #222; background: #050505; padding: 18px; animation: wpListIn 0.6s var(--ease-wp) both; }
        .post h2 { font-size: 22px; font-weight: 300; line-height: 1.2; text-transform: lowercase; color: var(--accent); margin-bottom: 8px; }
        .post p { font-size: 15px; font-weight: 300; color: #ccc; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; }
        .loader-gif { width: 30px; height: 30px; display: block; margin: 20px auto; }
        @keyframes wpListIn { from { transform: translateX(50px) rotateY(-15deg); opacity: 0; } to { transform: translateX(0) rotateY(0deg); opacity: 1; } }
    </style>
</head>
<body>
    <div class="page-header">
        <div class="page-subtitle">создай свою новость)</div>
        <div class="page-title">metroRSS</div>
    </div>
    <div class="wp-box">
        <h3>создать новость</h3>
        <input id="t" placeholder="заголовок новости">
        <textarea id="d" placeholder="текст новости (поддерживает базовый html: <p>, <b>, <i>)"></textarea>
        <button class="wp-btn" id="submit-btn">
            <i class="material-icons" style="font-size: 18px;">send</i> опубликовать
        </button>
    </div>
    <div class="feed-header">текущие публикации</div>
    <div id="feed"></div>
    <script src="/script.js"></script>
</body>
</html>
